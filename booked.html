<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Table Booking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #000;
      color: white;
      font-family: Arial, sans-serif;
    }

    .form-container {
      background: #111;
      padding: 30px;
      border-radius: 15px;
      max-width: 500px;
      margin: 80px auto;
      box-shadow: 0 0 20px orange;
    }

    h2 {
      color: orange;
      text-align: center;
      margin-bottom: 25px;
    }

    .form-control {
      background-color: #222;
      border: 1px solid orange;
      color: white;
    }

    .form-control:focus {
      border-color: orange;
      box-shadow: none;
    }

    .btn-custom {
      background-color: orange;
      color: black;
      font-weight: bold;
      border: none;
    }

    .btn-custom:hover {
      background-color: darkorange;
    }

    .home-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      text-decoration: none;
      background: orange;
      color: black;
      padding: 8px 15px;
      border-radius: 8px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<a href="book.html" class="home-btn">⬅ Back</a>

<div class="form-container">
  <h2>Book Your Table</h2>

  <form>
    <div class="mb-3">
      <label class="form-label">Table Name</label>
      <input type="text" id="tableNameField" class="form-control" readonly>
    </div>

    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" class="form-control" placeholder="Enter your name" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" placeholder="Enter your email" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Phone</label>
      <input type="tel" class="form-control" placeholder="Enter phone number" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Date</label>
      <input type="date" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Time</label>
      <input type="time" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Guests</label>
      <input type="number" class="form-control" min="1" placeholder="Enter number of guests" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Price</label>
      <input type="text" id="priceField" class="form-control" readonly>
    </div>

    <button type="submit" class="btn btn-custom w-100">Confirm Booking</button>
  </form>
</div>

<script>
  const params = new URLSearchParams(window.location.search);

  const price = params.get("price");
  const name = params.get("name");

  if (price) {
    document.getElementById("priceField").value = "₹" + price;
  } else {
    document.getElementById("priceField").value = "₹0";
  }

  if (name) {
    document.getElementById("tableNameField").value = decodeURIComponent(name);
  } else {
    document.getElementById("tableNameField").value = "Not Selected";
  }
</script>

</body>
</html>
