<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Up | Crave Corner</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Your CSS -->
  <link rel="stylesheet" href="css/signup.css">
</head>

<body>

<div class="signup-box">
  <h2 class="text-center mb-4">Create Account</h2>

  <form action="signup.php" method="POST">

    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Date of Birth</label>
      <input type="date" name="dob" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Email Address</label>
      <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Address</label>
      <textarea name="address" class="form-control" rows="2" placeholder="Enter your address" required></textarea>
    </div>

    <div class="mb-3 position-relative">
      <label class="form-label">Password</label>
      <input type="password" id="password" name="password" class="form-control" placeholder="Create password" required>
      <span class="toggle-eye" onclick="togglePassword()">👁</span>
    </div>

    <button type="submit" class="btn btn-custom w-100">Sign Up</button>

    <div class="text-center mt-3">
      <p>Already have an account? <a href="login.html" class="text-white">Login</a></p>
    </div>

  </form>
</div>

<script>
  function togglePassword() {
    const pwd = document.getElementById("password");
    pwd.type = pwd.type === "password" ? "text" : "password";
  }
</script>

</body>
</html>
